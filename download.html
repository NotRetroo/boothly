<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Boothly Download</title>

    <link rel="stylesheet"
        href="css/output.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">
    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="min-h-screen bg-[#F6F7FB] font-[Inter] text-[#111827]">
    <main class="mx-auto grid min-h-screen w-full max-w-7xl gap-8 px-6 py-8 lg:grid-cols-[1fr_360px] lg:px-10">
        <section class="flex min-h-[70vh] flex-col items-center">
            <header class="mb-8 text-center">
                <a href="index.html"
                    class="text-4xl font-black tracking-tight">
                    BOOTHLY
                </a>

                <h1 class="mt-4 text-2xl font-bold">
                    Your memories are ready
                </h1>
            </header>

            <div class="w-full max-w-4xl rounded-[28px] bg-white p-4 shadow-2xl shadow-slate-200/80">
                <canvas id="stripPreview"
                    class="block h-auto w-full rounded-[20px] bg-white">
                </canvas>
            </div>

            <p id="downloadStatus"
                class="mt-5 min-h-6 text-center text-sm font-semibold text-zinc-500">
                Loading preview...
            </p>
        </section>

        <aside class="self-start rounded-[28px] bg-white p-6 shadow-xl shadow-slate-200/70 lg:sticky lg:top-8">
            <section>
                <h2 class="text-lg font-bold">
                    Theme
                </h2>

                <div class="mt-4 grid gap-3">
                    <label class="flex items-center gap-3 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripTheme"
                            value="classic"
                            checked
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>Classic White</span>
                    </label>

                    <label class="flex items-center gap-3 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripTheme"
                            value="minimal"
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>Minimal</span>
                    </label>

                    <label class="flex items-center gap-3 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripTheme"
                            value="vintage"
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>Vintage</span>
                    </label>

                    <label class="flex items-center gap-3 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripTheme"
                            value="dark"
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>Dark</span>
                    </label>
                </div>
            </section>

            <section class="mt-8">
                <h2 class="text-lg font-bold">
                    Format
                </h2>

                <div class="mt-4 grid grid-cols-2 gap-3">
                    <label class="flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripFormat"
                            value="png"
                            checked
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>PNG</span>
                    </label>

                    <label class="flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripFormat"
                            value="jpeg"
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>JPEG</span>
                    </label>
                </div>
            </section>

            <section class="mt-8">
                <h2 class="text-lg font-bold">
                    Quality
                </h2>

                <div class="mt-4 grid grid-cols-2 gap-3">
                    <label class="flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripQuality"
                            value="high"
                            checked
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>High</span>
                    </label>

                    <label class="flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 px-4 py-3 font-semibold">
                        <input type="radio"
                            name="stripQuality"
                            value="standard"
                            class="h-4 w-4 accent-[#007AFF]">
                        <span>Standard</span>
                    </label>
                </div>
            </section>

            <button id="downloadPageButton"
                type="button"
                class="mt-8 w-full rounded-2xl bg-gradient-to-r from-[#007AFF] to-[#6A5CFF] py-5 text-lg font-bold text-white shadow-xl transition hover:scale-[1.01] disabled:cursor-not-allowed disabled:opacity-60">
                Download
            </button>
        </aside>
    </main>

    <script src="js/download.js"></script>
</body>

</html>
