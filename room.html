<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boothly • Room</title>

    <link rel="stylesheet" href="css/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="font-[Inter] bg-gradient-to-b from-white via-[#F8F8FA] to-[#F5F5F7] min-h-screen">

    <!-- Background Blur -->

    <div class="fixed inset-0 -z-10 overflow-hidden">

        <div class="absolute w-[450px] h-[450px] bg-blue-300/30 rounded-full blur-[180px] -left-40 -top-40"></div>

        <div class="absolute w-[450px] h-[450px] bg-pink-300/20 rounded-full blur-[180px] -right-40 bottom-0"></div>

    </div>

    <!-- Logo -->

    <div class="text-center pt-12">

        <a href="index.html" class="text-3xl font-bold tracking-tight">
            Boothly
        </a>

    </div>

    <!-- Card -->

    <div class="flex justify-center mt-12">

        <div class="bg-white w-[420px] rounded-[32px] shadow-xl p-10">

            <h1 class="text-3xl font-bold text-center">
                Join your photobooth
            </h1>

            <p class="text-center text-gray-500 mt-3">
                Create a room or join your friend's room.
            </p>

            <!-- Name -->

            <div class="mt-8">

                <label class="font-medium">
                    Your Name
                </label>

                <input id="name" type="text" placeholder="Enter your name"
                    class="mt-2 w-full rounded-2xl border border-gray-300 p-4 outline-none focus:ring-2 focus:ring-blue-500">

            </div>

            <!-- Room Code -->

            <div class="mt-6">

                <label class="font-medium">
                    Room Code
                </label>

                <input id="roomCode" type="text" placeholder="Only needed to join"
                    class="mt-2 w-full rounded-2xl border border-gray-300 p-4 outline-none focus:ring-2 focus:ring-blue-500">

            </div>

            <!-- Buttons -->

            <div class="mt-8 space-y-4">

                <button id="createBtn"
                    class="w-full bg-[#007AFF] text-white rounded-full py-4 font-semibold hover:shadow-xl transition">

                    Create Room

                </button>

                <button id="joinBtn"
                    class="w-full border border-gray-300 rounded-full py-4 font-semibold hover:bg-gray-100 transition">

                    Join Room

                </button>

            </div>

            <!-- Status -->

            <div id="status" class="hidden mt-8 bg-blue-50 rounded-2xl p-5 text-center">

                <h2 class="font-semibold text-lg">
                    Waiting for partner...
                </h2>

                <p class="text-gray-500 mt-2">
                    Share your room code:
                </p>

                <div id="generatedCode" class="mt-4 text-2xl font-bold tracking-widest text-[#007AFF]">

                </div>

            </div>

            <div id="waitingRoom"
                class="hidden mt-8 rounded-[28px] border border-blue-200 bg-gradient-to-b from-blue-50 to-white p-6 text-center shadow-lg">

                <p class="text-sm font-semibold uppercase tracking-widest text-blue-500">
                    Room Code
                </p>

                <div id="waitingCode"
                    class="mt-3 break-words text-4xl font-black tracking-widest text-[#007AFF]">
                </div>

                <p id="waitingMessage" class="mt-4 text-gray-500">
                    Waiting for your friend...
                </p>

                <div class="mt-6 grid grid-cols-2 gap-3">

                    <button id="copyCodeBtn"
                        class="rounded-full border border-blue-200 bg-white px-5 py-3 font-semibold text-[#007AFF] transition hover:shadow">
                        Copy
                    </button>

                    <button id="shareRoomBtn"
                        class="rounded-full bg-[#007AFF] px-5 py-3 font-semibold text-white transition hover:shadow-xl">
                        Share
                    </button>

                </div>

                <div id="friendConnected"
                    class="mt-6 hidden rounded-2xl bg-green-100 px-5 py-4 font-semibold text-green-700">
                    Friend Connected
                </div>

            </div>

        </div>

    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/room.js"></script>
    

</body>

</html>
