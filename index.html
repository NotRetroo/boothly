<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Boothly</title>

    <link rel="stylesheet" href="css/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="font-[Inter] bg-gradient-to-b from-white via-[#F8F8FA] to-[#F5F5F7] text-[#1D1D1F] overflow-x-hidden">

    <!-- Background Blur -->
    <div class="fixed inset-0 -z-10 overflow-hidden">

        <div
            class="absolute w-[450px] h-[450px] bg-blue-300/30 rounded-full blur-[180px] -left-40 -top-40">
        </div>

        <div
            class="absolute w-[450px] h-[450px] bg-pink-300/20 rounded-full blur-[180px] -right-40 bottom-0">
        </div>

    </div>

    <!-- Navbar -->

    <nav class="max-w-7xl mx-auto px-8 py-8">

        <h1 class="text-3xl font-bold tracking-tight">
            Boothly
        </h1>

    </nav>

    <!-- Hero -->

    <section class="max-w-6xl mx-auto text-center mt-10 px-6">

        <h2 class="text-6xl md:text-8xl font-black tracking-tight leading-none">

            Capture moments.

            <br>

            Together.

        </h2>

        <p class="mt-8 text-xl text-gray-500 max-w-3xl mx-auto leading-9">

            A collaborative online photobooth that lets two people
            create memories together, no matter where they are.

        </p>

        <div class="mt-14 flex flex-col sm:flex-row justify-center gap-5">

            <a href="room.html"
                class="bg-[#007AFF] text-white px-10 py-4 rounded-full text-lg font-semibold shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all duration-300">

                Create Room

            </a>

            <a href="room.html"
                class="bg-white border border-gray-200 px-10 py-4 rounded-full text-lg font-semibold shadow hover:-translate-y-1 hover:shadow-lg transition-all duration-300">

                Join Room

            </a>

        </div>

    </section>

    <!-- Illustration -->

    <section class="max-w-5xl mx-auto mt-28 mb-24 px-6">

        <div class="flex items-center justify-center gap-20">

            <!-- Left Card -->

            <div
                class="w-72 h-72 bg-white rounded-[36px] shadow-xl flex items-center justify-center hover:scale-105 transition duration-500">

                <span class="text-8xl">
                    📷
                </span>

            </div>

            <!-- Heart -->

            <div class="flex justify-center items-center w-20">

                <span class="text-6xl">
                    ❤️
                </span>

            </div>

            <!-- Right Card -->

            <div
                class="w-72 h-72 bg-white rounded-[36px] shadow-xl flex items-center justify-center hover:scale-105 transition duration-500">

                <span class="text-8xl">
                    📷
                </span>

            </div>

        </div>

    </section>

</body>

</html>
